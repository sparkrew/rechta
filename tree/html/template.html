<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rechta — dependency tree</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #141b26;
      --surface-2: #1c2636;
      --border: #2a3548;
      --line: #4a6280;
      --line-highlight: #58a6ff;
      --text: #e8eef5;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.35);
      --node: #3fb950;
      --composite: #d2a8ff;
      --reusable: #f0883e;
      --docker: #6e7681;
      --local: #79c0ff;
      --visited: #484f58;
      --root: #e3b341;
      --grid-dot: rgba(88, 166, 255, 0.08);
      --depth-0: #e3b341;
      --depth-1: #58a6ff;
      --depth-2: #3fb950;
      --depth-3: #d2a8ff;
      --depth-4: #f0883e;
      --depth-5: #79c0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--surface) 0%, rgba(20, 27, 38, 0.95) 100%);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      margin: 0 0 0.2rem;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.8125rem; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1.1rem;
      margin-top: 0.75rem;
      font-size: 0.75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .badge-type-node { background: rgba(63, 185, 80, 0.2); color: var(--node); }
    .badge-type-composite { background: rgba(210, 168, 255, 0.2); color: var(--composite); }
    .badge-type-reusable-workflow { background: rgba(240, 136, 62, 0.2); color: var(--reusable); }
    .badge-type-docker { background: rgba(110, 118, 129, 0.3); color: var(--docker); }
    .badge-type-unknown { background: rgba(139, 148, 158, 0.2); color: var(--muted); }
    .badge-type-workflow { background: rgba(227, 179, 65, 0.2); color: var(--root); }
    .badge-depth { background: rgba(255, 255, 255, 0.06); color: var(--muted); font-family: ui-monospace, monospace; text-transform: none; }
    .badge-sha { background: rgba(88, 166, 255, 0.15); color: var(--accent); font-family: ui-monospace, monospace; font-weight: 500; text-transform: none; }
    .badge-visited { background: rgba(72, 79, 88, 0.4); color: var(--muted); }
    .tabs-bar {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 0 0 auto;
      padding: 0.6rem 1rem;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: transparent;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      font-size: 0.8125rem;
      cursor: pointer;
      white-space: nowrap;
      max-width: 14rem;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s, background 0.15s;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255, 255, 255, 0.03); }
    .tab-btn[aria-selected="true"] {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--bg);
    }
    main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .tab-panel.active { display: flex; }
    .tab-panel-path {
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.45rem 1rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: rgba(20, 27, 38, 0.6);
      flex-shrink: 0;
    }

    .map-shell {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    .map-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      outline: none;
    }
    .map-viewport.is-dragging { cursor: grabbing; }
    .map-viewport.is-dragging .node-box { pointer-events: none; }
    .map-canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .graph-layout {
      position: relative;
    }
    .graph-depth-bands {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .graph-depth-band {
      position: absolute;
      left: 0;
      right: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .graph-depth-band:nth-child(odd) { background: rgba(88, 166, 255, 0.025); }
    .graph-depth-band:nth-child(even) { background: rgba(255, 255, 255, 0.012); }
    svg.graph-edges {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }
    svg.graph-edges path {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      transition: stroke 0.15s, stroke-width 0.15s;
    }
    svg.graph-edges path.path-highlight {
      stroke: var(--line-highlight);
      stroke-width: 2.5;
    }
    .graph-nodes {
      position: relative;
      z-index: 2;
    }

    .map-toolbar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      z-index: 20;
      pointer-events: none;
    }
    .map-toolbar-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.35rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 27, 38, 0.82);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
    }
    .map-btn {
      width: 2.1rem;
      height: 2.1rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .map-btn-wide {
      width: auto;
      min-width: 2.1rem;
      padding: 0 0.5rem;
      font-size: 0.625rem;
      font-family: ui-monospace, monospace;
      letter-spacing: 0.02em;
    }
    .map-btn:hover {
      background: rgba(88, 166, 255, 0.12);
      border-color: rgba(88, 166, 255, 0.45);
    }
    .map-btn:active { transform: scale(0.94); }
    .map-hint {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(20, 27, 38, 0.75);
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-size: 0.6875rem;
      z-index: 20;
      pointer-events: none;
      opacity: 0.85;
      max-width: 22rem;
      line-height: 1.45;
    }
    .map-minimap {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      width: 180px;
      height: 120px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(10, 14, 20, 0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      z-index: 20;
      overflow: hidden;
      cursor: crosshair;
    }
    .map-minimap-label {
      position: absolute;
      top: 0.35rem;
      left: 0.5rem;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      pointer-events: none;
      z-index: 2;
    }
    .map-minimap-content {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      pointer-events: none;
    }
    .minimap-rect {
      position: absolute;
      border-radius: 2px;
      background: rgba(88, 166, 255, 0.35);
      border: 1px solid rgba(88, 166, 255, 0.5);
    }
    .minimap-rect.root {
      background: rgba(227, 179, 65, 0.45);
      border-color: rgba(227, 179, 65, 0.65);
    }
    .map-minimap-viewport {
      position: absolute;
      border: 2px solid var(--accent);
      background: rgba(88, 166, 255, 0.12);
      box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.25);
      border-radius: 2px;
      pointer-events: none;
      z-index: 3;
      transition: box-shadow 0.2s;
    }
    .map-minimap:hover .map-minimap-viewport {
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .map-zoom-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(20, 27, 38, 0.75);
      backdrop-filter: blur(8px);
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      color: var(--muted);
      z-index: 20;
      pointer-events: none;
    }

    .graph-node-slot {
      position: absolute;
    }
    .graph-node {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .node-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.55rem 0.75rem;
      width: 100%;
      border-radius: 10px;
      border: 2px solid var(--border);
      border-left-width: 4px;
      border-left-color: var(--depth-accent, var(--border));
      background: linear-gradient(145deg, var(--surface-2) 0%, rgba(28, 38, 54, 0.95) 100%);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, opacity 0.2s;
      cursor: pointer;
    }
    .node-box.root {
      border-color: rgba(227, 179, 65, 0.55);
      border-left-color: var(--root);
      background: linear-gradient(145deg, rgba(227, 179, 65, 0.14) 0%, rgba(227, 179, 65, 0.06) 100%);
      box-shadow: 0 4px 20px rgba(227, 179, 65, 0.15);
    }
    .node-box:hover {
      border-color: var(--accent);
      border-left-color: var(--accent);
      box-shadow: 0 6px 24px rgba(88, 166, 255, 0.2);
      transform: translateY(-2px);
    }
    .node-box.path-highlight {
      border-color: var(--accent);
      border-left-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.3), 0 6px 24px rgba(88, 166, 255, 0.25);
    }
    .node-box.selected {
      border-color: var(--accent);
      border-left-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow), 0 8px 28px rgba(88, 166, 255, 0.3);
    }
    .node-box.dimmed { opacity: 0.45; }
    .node-box.visited { border-style: dashed; opacity: 0.88; }
    .node-box.type-composite { border-top-color: rgba(210, 168, 255, 0.5); }
    .node-box.type-reusable-workflow { border-top-color: rgba(240, 136, 62, 0.5); }
    .node-box.type-local { border-top-color: rgba(121, 192, 255, 0.5); }
    .node-box .label {
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1.35;
      word-break: break-word;
      text-align: center;
    }
    .node-box .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.25rem;
    }
    .node-box .node-actions {
      display: flex;
      gap: 0.35rem;
      margin-top: 0.1rem;
    }
    button.toggle, button.details-btn, button.copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      border-radius: 5px;
      padding: 0.15rem 0.45rem;
      font-size: 0.6875rem;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    button.toggle:hover, button.details-btn:hover, button.copy-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }
    .details-panel {
      display: none;
      margin-top: 0.5rem;
      padding: 0.65rem;
      width: 100%;
      min-width: 14rem;
      max-width: 22rem;
      background: rgba(20, 27, 38, 0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.75rem;
      text-align: left;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 5;
    }
    .details-panel.open { display: block; }
    .details-panel dl { margin: 0; }
    .details-panel dt { color: var(--muted); font-size: 0.6875rem; margin-top: 0.4rem; }
    .details-panel dt:first-child { margin-top: 0; }
    .details-panel dd {
      margin: 0.1rem 0 0;
      font-family: ui-monospace, monospace;
      word-break: break-all;
      font-size: 0.6875rem;
    }
    .details-panel a { color: var(--accent); }
    .details-actions { margin-top: 0.4rem; display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>GitHub Actions dependency tree</h1>
    <p>Generated by <strong>rechta</strong> — pan/zoom map view with depth hierarchy, one tab per workflow</p>
    <div class="legend">
      <span class="legend-item"><span class="badge badge-type-workflow">workflow</span> Root</span>
      <span class="legend-item"><span class="badge badge-type-node">node</span> JavaScript action</span>
      <span class="legend-item"><span class="badge badge-type-composite">composite</span> Composite</span>
      <span class="legend-item"><span class="badge badge-type-reusable-workflow">reusable</span> Reusable workflow</span>
      <span class="legend-item"><span class="badge badge-visited">*</span> Deduplicated</span>
      <span class="legend-item"><span class="badge badge-depth">L1</span> Depth level</span>
    </div>
  </header>
  <div class="tabs-bar" id="tabs" role="tablist" hidden></div>
  <main id="main"></main>
  <script type="application/json" id="rechta-data">{{.JSON}}</script>
  <script>
(function () {
  const payload = JSON.parse(document.getElementById('rechta-data').textContent);
  const workflows = payload.workflows || [];
  const tabsEl = document.getElementById('tabs');
  const mainEl = document.getElementById('main');

  const MIN_SCALE = 0.15;
  const MIN_FIT_SCALE = 0.05;
  const MAX_SCALE = 2.5;
  const ZOOM_STEP = 1.15;
  const CANVAS_PAD = 64;
  const NODE_W = 176;
  const NODE_H = 88;
  const ROOT_W = 208;
  const ROOT_H = 88;
  const H_GAP = 28;
  const V_GAP = 72;
  const DEPTH_COLORS = ['var(--depth-0)', 'var(--depth-1)', 'var(--depth-2)', 'var(--depth-3)', 'var(--depth-4)', 'var(--depth-5)'];

  let activeShell = null;
  let idCounter = 0;

  function tabId(index) { return 'tab-panel-' + index; }
  function nextId() { return 'n-' + (idCounter++); }
  function depthColor(depth) { return DEPTH_COLORS[depth % DEPTH_COLORS.length]; }

  function shortName(path) {
    const parts = path.replace(/\\/g, '/').split('/');
    return parts[parts.length - 1] || path;
  }

  function shortSHA(sha) {
    if (!sha) return '';
    return sha.length > 12 ? sha.slice(0, 12) : sha;
  }

  function labelFor(node) {
    const ref = node.ref || {};
    if (ref.is_local) return ref.local_path || ref.uses || './local';
    return ref.uses || [ref.owner, ref.repo, ref.path].filter(Boolean).join('/');
  }

  function githubURL(node) {
    const ref = node.ref || {};
    if (ref.is_local || !ref.owner || !ref.repo || !node.sha) return null;
    return 'https://github.com/' + ref.owner + '/' + ref.repo + '/tree/' + node.sha;
  }

  function badgeClass(type) {
    const t = (type || 'unknown').toLowerCase();
    if (t === 'composite') return 'badge-type-composite';
    if (t === 'reusable-workflow') return 'badge-type-reusable-workflow';
    if (t === 'node') return 'badge-type-node';
    if (t === 'docker') return 'badge-type-docker';
    if (t === 'workflow') return 'badge-type-workflow';
    return 'badge-type-unknown';
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(function () {
      const prev = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = prev; }, 1200);
    });
  }

  function isInteractiveTarget(el) {
    if (!el || !el.closest) return false;
    return !!el.closest('button, a, input, textarea, select, .details-panel');
  }

  function depsOf(node) {
    return node.dependencies || node.children || [];
  }

  /* ---- Top-down tree layout (compact, centered over children) ---- */

  function buildTreeModel(wf) {
    function walk(nodeData, isRoot, depth, parentId) {
      const id = nextId();
      const childrenData = isRoot ? depsOf(wf) : depsOf(nodeData);
      return {
        id: id,
        data: isRoot ? { path: wf.path } : nodeData,
        isRoot: isRoot,
        depth: depth,
        parentId: parentId,
        children: childrenData.map(function (child) {
          return walk(child, false, depth + 1, id);
        })
      };
    }
    return walk(null, true, 0, null);
  }

  function countLeaves(node, collapsed) {
    if (collapsed.has(node.id) || node.children.length === 0) return 1;
    return node.children.reduce(function (sum, c) { return sum + countLeaves(c, collapsed); }, 0);
  }

  function layoutTopDown(root, collapsed) {
    const placements = [];
    const edges = [];
    let maxDepth = 0;
    let leafIndex = 0;
    const unitW = NODE_W + H_GAP;

    function place(node, depth) {
      maxDepth = Math.max(maxDepth, depth);
      const w = node.isRoot ? ROOT_W : NODE_W;
      const h = node.isRoot ? ROOT_H : NODE_H;
      const isCollapsed = collapsed.has(node.id);
      const visibleChildren = isCollapsed ? [] : node.children;

      let centerX;
      if (visibleChildren.length === 0) {
        centerX = leafIndex * unitW + w / 2;
        leafIndex++;
      } else {
        visibleChildren.forEach(function (child) { place(child, depth + 1); });
        const first = placements.find(function (p) { return p.id === visibleChildren[0].id; });
        const last = placements.find(function (p) { return p.id === visibleChildren[visibleChildren.length - 1].id; });
        centerX = (first.centerX + last.centerX) / 2;
      }

      const x = centerX - w / 2;
      const y = depth * (NODE_H + V_GAP);
      placements.push({
        id: node.id,
        node: node,
        x: x,
        y: y,
        centerX: centerX,
        width: w,
        height: h,
        depth: depth
      });

      visibleChildren.forEach(function (child) {
        edges.push({ from: node.id, to: child.id });
      });
    }

    place(root, 0);

    let minX = Infinity;
    let maxX = -Infinity;
    let maxY = 0;
    placements.forEach(function (p) {
      minX = Math.min(minX, p.x);
      maxX = Math.max(maxX, p.x + p.width);
      maxY = Math.max(maxY, p.y + p.height);
    });
    if (!placements.length) {
      minX = 0;
      maxX = ROOT_W;
      maxY = ROOT_H;
    }

    const offsetX = CANVAS_PAD - minX;
    const offsetY = CANVAS_PAD;
    placements.forEach(function (p) {
      p.x += offsetX;
      p.centerX += offsetX;
      p.y += offsetY;
    });

    return {
      placements: placements,
      edges: edges,
      width: maxX - minX + CANVAS_PAD * 2,
      height: maxY + CANVAS_PAD * 2,
      maxDepth: maxDepth,
      rowHeight: NODE_H + V_GAP
    };
  }

  /* ---- Pan / zoom ---- */

  function PanZoomMap(viewport, canvas, minimapEl, zoomBadgeEl, graphView) {
    this.viewport = viewport;
    this.canvas = canvas;
    this.minimapEl = minimapEl;
    this.minimapContent = minimapEl.querySelector('.map-minimap-content');
    this.minimapViewport = minimapEl.querySelector('.map-minimap-viewport');
    this.zoomBadgeEl = zoomBadgeEl;
    this.graphView = graphView;

    this.scale = 1;
    this.panX = 0;
    this.panY = 0;
    this.dragging = false;
    this.dragStartX = 0;
    this.dragStartY = 0;
    this.panStartX = 0;
    this.panStartY = 0;
    this.pointers = new Map();
    this.lastPinchDist = 0;

    this._onPointerDown = this.onPointerDown.bind(this);
    this._onPointerMove = this.onPointerMove.bind(this);
    this._onPointerUp = this.onPointerUp.bind(this);
    this._onWheel = this.onWheel.bind(this);
    this._onDblClick = this.onDblClick.bind(this);
    this._onMinimapDown = this.onMinimapDown.bind(this);
    this._onResize = this.onResize.bind(this);

    viewport.addEventListener('pointerdown', this._onPointerDown);
    viewport.addEventListener('pointermove', this._onPointerMove);
    viewport.addEventListener('pointerup', this._onPointerUp);
    viewport.addEventListener('pointercancel', this._onPointerUp);
    viewport.addEventListener('wheel', this._onWheel, { passive: false });
    viewport.addEventListener('dblclick', this._onDblClick);
    minimapEl.addEventListener('pointerdown', this._onMinimapDown);
    window.addEventListener('resize', this._onResize);
  }

  PanZoomMap.prototype.destroy = function () {
    this.viewport.removeEventListener('pointerdown', this._onPointerDown);
    this.viewport.removeEventListener('pointermove', this._onPointerMove);
    this.viewport.removeEventListener('pointerup', this._onPointerUp);
    this.viewport.removeEventListener('pointercancel', this._onPointerUp);
    this.viewport.removeEventListener('wheel', this._onWheel);
    this.viewport.removeEventListener('dblclick', this._onDblClick);
    this.minimapEl.removeEventListener('pointerdown', this._onMinimapDown);
    window.removeEventListener('resize', this._onResize);
  };

  PanZoomMap.prototype.measureCanvas = function () {
    const layout = this.graphView.layout;
    if (layout && layout.width && layout.height) {
      this.canvas.style.width = layout.width + 'px';
      this.canvas.style.height = layout.height + 'px';
      return { width: layout.width, height: layout.height };
    }
    return {
      width: this.canvas.scrollWidth || this.canvas.offsetWidth,
      height: this.canvas.scrollHeight || this.canvas.offsetHeight
    };
  };

  PanZoomMap.prototype.getCanvasSize = function () {
    const w = parseFloat(this.canvas.style.width);
    const h = parseFloat(this.canvas.style.height);
    if (w && h) return { width: w, height: h };
    return this.measureCanvas();
  };

  PanZoomMap.prototype.applyTransform = function () {
    this.canvas.style.transform = 'translate(' + this.panX + 'px, ' + this.panY + 'px) scale(' + this.scale + ')';
    if (this.zoomBadgeEl) {
      this.zoomBadgeEl.textContent = Math.round(this.scale * 100) + '%';
    }
    this.updateMinimap();
  };

  PanZoomMap.prototype.fitToView = function (padding) {
    padding = padding == null ? 48 : padding;
    const vp = this.viewport.getBoundingClientRect();
    const size = this.measureCanvas();
    if (!size.width || !size.height || !vp.width) return;

    const scaleX = (vp.width - padding * 2) / size.width;
    const scaleY = (vp.height - padding * 2) / size.height;
    const fitScale = Math.min(scaleX, scaleY);
    this.scale = Math.min(Math.max(fitScale, MIN_FIT_SCALE), MAX_SCALE);

    this.panX = (vp.width - size.width * this.scale) / 2;
    this.panY = (vp.height - size.height * this.scale) / 2;
    this.applyTransform();
  };

  PanZoomMap.prototype.zoomAt = function (clientX, clientY, factor) {
    const rect = this.viewport.getBoundingClientRect();
    const mx = clientX - rect.left;
    const my = clientY - rect.top;
    const newScale = Math.min(Math.max(this.scale * factor, MIN_SCALE), MAX_SCALE);
    const ratio = newScale / this.scale;

    this.panX = mx - (mx - this.panX) * ratio;
    this.panY = my - (my - this.panY) * ratio;
    this.scale = newScale;
    this.applyTransform();
  };

  PanZoomMap.prototype.panBy = function (dx, dy) {
    this.panX += dx;
    this.panY += dy;
    this.applyTransform();
  };

  PanZoomMap.prototype.panToCanvasPoint = function (canvasX, canvasY) {
    const vp = this.viewport.getBoundingClientRect();
    this.panX = vp.width / 2 - canvasX * this.scale;
    this.panY = vp.height / 2 - canvasY * this.scale;
    this.applyTransform();
  };

  PanZoomMap.prototype.getMinimapTransform = function () {
    const mmRect = this.minimapEl.getBoundingClientRect();
    const size = this.getCanvasSize();
    if (!size.width || !size.height || !mmRect.width) return null;

    const fitScale = Math.min(
      (mmRect.width - 8) / size.width,
      (mmRect.height - 8) / size.height
    );
    const offsetX = (mmRect.width - size.width * fitScale) / 2;
    const offsetY = (mmRect.height - size.height * fitScale) / 2;
    return { fitScale: fitScale, offsetX: offsetX, offsetY: offsetY };
  };

  PanZoomMap.prototype.syncMinimapRects = function () {
    const layout = this.graphView.layout;
    if (!layout) return;
    this.minimapContent.innerHTML = '';
    layout.placements.forEach(function (p) {
      const rect = document.createElement('div');
      rect.className = 'minimap-rect' + (p.node.isRoot ? ' root' : '');
      rect.style.left = p.x + 'px';
      rect.style.top = p.y + 'px';
      rect.style.width = Math.max(p.width * 0.35, 4) + 'px';
      rect.style.height = Math.max(p.height * 0.35, 3) + 'px';
      this.minimapContent.appendChild(rect);
    }, this);
  };

  PanZoomMap.prototype.updateMinimap = function () {
    const mmRect = this.minimapEl.getBoundingClientRect();
    const size = this.getCanvasSize();
    const mm = this.getMinimapTransform();
    if (!size.width || !size.height || !mm) return;

    this.minimapContent.style.transform =
      'translate(' + mm.offsetX + 'px, ' + mm.offsetY + 'px) scale(' + mm.fitScale + ')';

    const vpRect = this.viewport.getBoundingClientRect();
    const viewLeft = (-this.panX / this.scale) * mm.fitScale + mm.offsetX;
    const viewTop = (-this.panY / this.scale) * mm.fitScale + mm.offsetY;
    const viewW = (vpRect.width / this.scale) * mm.fitScale;
    const viewH = (vpRect.height / this.scale) * mm.fitScale;

    this.minimapViewport.style.left = viewLeft + 'px';
    this.minimapViewport.style.top = viewTop + 'px';
    this.minimapViewport.style.width = Math.max(viewW, 6) + 'px';
    this.minimapViewport.style.height = Math.max(viewH, 6) + 'px';
  };

  PanZoomMap.prototype.onResize = function () {
    this.measureCanvas();
    this.updateMinimap();
  };

  PanZoomMap.prototype.onPointerDown = function (e) {
    if (isInteractiveTarget(e.target)) return;
    this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    this.viewport.setPointerCapture(e.pointerId);

    if (this.pointers.size === 1) {
      this.dragging = true;
      this.dragStartX = e.clientX;
      this.dragStartY = e.clientY;
      this.panStartX = this.panX;
      this.panStartY = this.panY;
      this.viewport.classList.add('is-dragging');
    } else if (this.pointers.size === 2) {
      this.dragging = false;
      this.lastPinchDist = this.getPinchDistance();
    }
  };

  PanZoomMap.prototype.onPointerMove = function (e) {
    if (!this.pointers.has(e.pointerId)) return;
    this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (this.pointers.size === 2) {
      const dist = this.getPinchDistance();
      if (this.lastPinchDist > 0) {
        const center = this.getPinchCenter();
        this.zoomAt(center.x, center.y, dist / this.lastPinchDist);
      }
      this.lastPinchDist = dist;
      return;
    }

    if (this.dragging) {
      this.panX = this.panStartX + (e.clientX - this.dragStartX);
      this.panY = this.panStartY + (e.clientY - this.dragStartY);
      this.applyTransform();
    }
  };

  PanZoomMap.prototype.onPointerUp = function (e) {
    this.pointers.delete(e.pointerId);
    if (this.pointers.size < 2) this.lastPinchDist = 0;
    if (this.pointers.size === 0) {
      this.dragging = false;
      this.viewport.classList.remove('is-dragging');
    }
    try { this.viewport.releasePointerCapture(e.pointerId); } catch (_) {}
  };

  PanZoomMap.prototype.onWheel = function (e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
    this.zoomAt(e.clientX, e.clientY, factor);
  };

  PanZoomMap.prototype.onDblClick = function (e) {
    if (isInteractiveTarget(e.target)) return;
    this.fitToView();
  };

  PanZoomMap.prototype.onMinimapDown = function (e) {
    e.preventDefault();
    const mmRect = this.minimapEl.getBoundingClientRect();
    const mm = this.getMinimapTransform();
    if (!mm) return;
    const canvasX = (e.clientX - mmRect.left - mm.offsetX) / mm.fitScale;
    const canvasY = (e.clientY - mmRect.top - mm.offsetY) / mm.fitScale;
    this.panToCanvasPoint(canvasX, canvasY);
  };

  PanZoomMap.prototype.getPinchDistance = function () {
    const pts = Array.from(this.pointers.values());
    if (pts.length < 2) return 0;
    const dx = pts[1].x - pts[0].x;
    const dy = pts[1].y - pts[0].y;
    return Math.hypot(dx, dy);
  };

  PanZoomMap.prototype.getPinchCenter = function () {
    const pts = Array.from(this.pointers.values());
    return { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
  };

  /* ---- Graph view (render + interaction) ---- */

  function buildDetailsPanel(node, isRoot) {
    const panel = document.createElement('div');
    panel.className = 'details-panel';
    if (isRoot) {
      const p = document.createElement('p');
      p.style.margin = '0';
      p.style.color = 'var(--muted)';
      p.textContent = 'Direct and transitive dependencies for this workflow.';
      panel.appendChild(p);
      return panel;
    }
    const dl = document.createElement('dl');
    function addField(name, value) {
      if (!value) return;
      const dt = document.createElement('dt');
      dt.textContent = name;
      const dd = document.createElement('dd');
      dd.textContent = value;
      dl.appendChild(dt);
      dl.appendChild(dd);
    }
    addField('uses', (node.ref && node.ref.uses) || labelFor(node));
    addField('SHA', node.sha);
    addField('Type', node.type);
    addField('Content path', node.content_path);
    addField('Content SHA-256', node.content_sha256);
    if (node.already_visited) addField('Note', 'Already visited (deduplicated)');
    const gh = githubURL(node);
    if (gh) {
      const dt = document.createElement('dt');
      dt.textContent = 'Repository';
      const dd = document.createElement('dd');
      const a = document.createElement('a');
      a.href = gh;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = gh;
      dd.appendChild(a);
      dl.appendChild(dt);
      dl.appendChild(dd);
    }
    panel.appendChild(dl);
    const actions = document.createElement('div');
    actions.className = 'details-actions';
    if (node.sha) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'copy-btn';
      b.textContent = 'Copy SHA';
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        copyText(node.sha, b);
      });
      actions.appendChild(b);
    }
    if (node.content_sha256) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'copy-btn';
      b.textContent = 'Copy hash';
      b.addEventListener('click', function (e) {
        e.stopPropagation();
        copyText(node.content_sha256, b);
      });
      actions.appendChild(b);
    }
    if (actions.childNodes.length) panel.appendChild(actions);
    return panel;
  }

  function GraphView(wf, layoutEl, svgEl, nodesEl, bandsEl) {
    this.wf = wf;
    this.layoutEl = layoutEl;
    this.svgEl = svgEl;
    this.nodesEl = nodesEl;
    this.bandsEl = bandsEl;
    this.root = buildTreeModel(wf);
    this.collapsed = new Set();
    this.layout = null;
    this.entries = new Map();
    this.selectedId = null;
    this.highlightId = null;
    this.onLayoutChange = null;
  }

  GraphView.prototype.relayout = function () {
    this.layout = layoutTopDown(this.root, this.collapsed);
    this.render();
    if (this.onLayoutChange) this.onLayoutChange();
  };

  GraphView.prototype.collectSubtreeIds = function (node) {
    const ids = [node.id];
    node.children.forEach(function (c) {
      ids.push.apply(ids, this.collectSubtreeIds(c));
    }, this);
    return ids;
  };

  GraphView.prototype.getAncestorIds = function (nodeId) {
    const ids = [];
    let current = this.entries.get(nodeId);
    while (current && current.parentId) {
      ids.push(current.parentId);
      current = this.entries.get(current.parentId);
    }
    return ids;
  };

  GraphView.prototype.setHighlight = function (nodeId) {
    this.highlightId = nodeId;
    const highlightIds = new Set();
    if (nodeId) {
      highlightIds.add(nodeId);
      this.getAncestorIds(nodeId).forEach(function (id) { highlightIds.add(id); });
    }
    this.entries.forEach(function (entry, id) {
      const box = entry.boxEl;
      if (!box) return;
      const onPath = highlightIds.has(id);
      const selected = id === this.selectedId;
      box.classList.toggle('path-highlight', onPath && !selected);
      box.classList.toggle('selected', selected);
      box.classList.toggle('dimmed', !!nodeId && !onPath && id !== this.selectedId);
    }, this);
    this.svgEl.querySelectorAll('path').forEach(function (path) {
      const from = path.getAttribute('data-from');
      const to = path.getAttribute('data-to');
      const onPath = nodeId && highlightIds.has(from) && highlightIds.has(to);
      path.classList.toggle('path-highlight', !!onPath);
    });
  };

  GraphView.prototype.toggleCollapse = function (nodeId) {
    if (this.collapsed.has(nodeId)) {
      this.collapsed.delete(nodeId);
    } else {
      this.collapsed.add(nodeId);
    }
    this.relayout();
  };

  GraphView.prototype.expandAll = function () {
    this.collapsed.clear();
    this.relayout();
  };

  GraphView.prototype.collapseAll = function () {
    this.collapsed.clear();
    function walk(node) {
      if (node.children.length > 0) this.collapsed.add(node.id);
      node.children.forEach(walk, this);
    }
    walk.call(this, this.root);
    this.relayout();
  };

  GraphView.prototype.buildNodeUI = function (treeNode) {
    const isRoot = treeNode.isRoot;
    const nodeData = treeNode.data;
    const hasChildren = treeNode.children.length > 0;
    const depth = treeNode.depth;

    const slot = document.createElement('div');
    slot.className = 'graph-node-slot';
    slot.dataset.nodeId = treeNode.id;

    const wrap = document.createElement('div');
    wrap.className = 'graph-node';

    const box = document.createElement('div');
    box.className = 'node-box' + (isRoot ? ' root' : ' type-' + (nodeData.type || 'unknown'));
    box.style.setProperty('--depth-accent', depthColor(depth));
    if (!isRoot && nodeData.ref && nodeData.ref.is_local) box.classList.add('type-local');
    if (!isRoot && nodeData.already_visited) box.classList.add('visited');

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = isRoot ? shortName(nodeData.path) : labelFor(nodeData);
    label.title = isRoot ? nodeData.path : labelFor(nodeData);
    box.appendChild(label);

    const badges = document.createElement('div');
    badges.className = 'badges';
    const depthBadge = document.createElement('span');
    depthBadge.className = 'badge badge-depth';
    depthBadge.textContent = 'L' + depth;
    badges.appendChild(depthBadge);
    const typeBadge = document.createElement('span');
    typeBadge.className = 'badge ' + badgeClass(isRoot ? 'workflow' : nodeData.type);
    typeBadge.textContent = isRoot ? 'workflow' : (nodeData.type || 'unknown');
    badges.appendChild(typeBadge);
    if (!isRoot && nodeData.sha) {
      const shaBadge = document.createElement('span');
      shaBadge.className = 'badge badge-sha';
      shaBadge.title = nodeData.sha;
      shaBadge.textContent = shortSHA(nodeData.sha);
      badges.appendChild(shaBadge);
    }
    if (!isRoot && nodeData.already_visited) {
      const v = document.createElement('span');
      v.className = 'badge badge-visited';
      v.title = 'Deduplicated';
      v.textContent = '*';
      badges.appendChild(v);
    }
    box.appendChild(badges);

    const actions = document.createElement('div');
    actions.className = 'node-actions';
    const detailsBtn = document.createElement('button');
    detailsBtn.type = 'button';
    detailsBtn.className = 'details-btn';
    detailsBtn.textContent = 'Details';
    const detailsPanel = buildDetailsPanel(nodeData, isRoot);
    detailsBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      detailsPanel.classList.toggle('open');
    });
    actions.appendChild(detailsBtn);

    let toggle = null;
    if (hasChildren) {
      toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'toggle';
      const collapsed = this.collapsed.has(treeNode.id);
      toggle.textContent = collapsed ? '+' : '\u2212';
      toggle.title = collapsed ? 'Expand subtree' : 'Collapse subtree';
      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        this.toggleCollapse(treeNode.id);
      }.bind(this));
      actions.appendChild(toggle);
    }
    box.appendChild(actions);

    box.addEventListener('mouseenter', function () {
      this.setHighlight(treeNode.id);
    }.bind(this));
    box.addEventListener('mouseleave', function () {
      if (this.selectedId) {
        this.setHighlight(this.selectedId);
      } else {
        this.setHighlight(null);
      }
    }.bind(this));
    box.addEventListener('click', function (e) {
      if (isInteractiveTarget(e.target)) return;
      this.selectedId = this.selectedId === treeNode.id ? null : treeNode.id;
      this.setHighlight(this.selectedId || this.highlightId);
    }.bind(this));

    wrap.appendChild(box);
    wrap.appendChild(detailsPanel);
    slot.appendChild(wrap);

    return { slot: slot, boxEl: box, toggle: toggle };
  };

  GraphView.prototype.render = function () {
    const layout = this.layout;
    this.layoutEl.style.width = layout.width + 'px';
    this.layoutEl.style.height = layout.height + 'px';

    this.bandsEl.innerHTML = '';
    for (let d = 0; d <= layout.maxDepth; d++) {
      const band = document.createElement('div');
      band.className = 'graph-depth-band';
      band.style.top = (CANVAS_PAD + d * layout.rowHeight - 8) + 'px';
      band.style.height = layout.rowHeight + 'px';
      this.bandsEl.appendChild(band);
    }

    this.svgEl.setAttribute('width', layout.width);
    this.svgEl.setAttribute('height', layout.height);
    this.svgEl.innerHTML =
      '<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">' +
      '<polygon points="0 0, 8 3, 0 6" fill="var(--line)"/></marker></defs>';

    this.nodesEl.innerHTML = '';
    this.entries.clear();

    layout.placements.forEach(function (p) {
      const ui = this.buildNodeUI(p.node);
      ui.slot.style.left = p.x + 'px';
      ui.slot.style.top = p.y + 'px';
      ui.slot.style.width = p.width + 'px';
      this.nodesEl.appendChild(ui.slot);
      this.entries.set(p.id, {
        id: p.id,
        parentId: p.node.parentId,
        boxEl: ui.boxEl,
        placement: p
      });
    }, this);

    layout.edges.forEach(function (edge) {
      const fromP = layout.placements.find(function (p) { return p.id === edge.from; });
      const toP = layout.placements.find(function (p) { return p.id === edge.to; });
      if (!fromP || !toP) return;

      const x1 = fromP.centerX;
      const y1 = fromP.y + fromP.height;
      const x2 = toP.centerX;
      const y2 = toP.y;
      const midY = y1 + (y2 - y1) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d',
        'M' + x1 + ',' + y1 +
        ' L' + x1 + ',' + midY +
        ' L' + x2 + ',' + midY +
        ' L' + x2 + ',' + y2
      );
      path.setAttribute('marker-end', 'url(#arrowhead)');
      path.setAttribute('data-from', edge.from);
      path.setAttribute('data-to', edge.to);
      this.svgEl.appendChild(path);
    }, this);

    if (this.selectedId) {
      this.setHighlight(this.selectedId);
    } else if (this.highlightId) {
      this.setHighlight(this.highlightId);
    }
  };

  function createMapToolbar(actions) {
    const toolbar = document.createElement('div');
    toolbar.className = 'map-toolbar';

    function addBtn(group, label, title, onClick, wide) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'map-btn' + (wide ? ' map-btn-wide' : '');
      btn.textContent = label;
      btn.title = title;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        onClick();
      });
      group.appendChild(btn);
    }

    const zoomGroup = document.createElement('div');
    zoomGroup.className = 'map-toolbar-group';
    addBtn(zoomGroup, '+', 'Zoom in (+)', actions.zoomIn);
    addBtn(zoomGroup, '\u2212', 'Zoom out (-)', actions.zoomOut);
    addBtn(zoomGroup, '\u229EF', 'Fit to view (0)', actions.fit);
    addBtn(zoomGroup, '1', 'Reset zoom (100%)', actions.reset);
    toolbar.appendChild(zoomGroup);

    const treeGroup = document.createElement('div');
    treeGroup.className = 'map-toolbar-group';
    addBtn(treeGroup, 'Expand', 'Expand all subtrees', actions.expandAll, true);
    addBtn(treeGroup, 'Collapse', 'Collapse all subtrees', actions.collapseAll, true);
    toolbar.appendChild(treeGroup);

    return toolbar;
  }

  function renderWorkflowGraph(wf) {
    const shell = document.createElement('div');
    shell.className = 'map-shell';

    const zoomBadge = document.createElement('div');
    zoomBadge.className = 'map-zoom-badge';
    zoomBadge.textContent = '100%';

    const viewport = document.createElement('div');
    viewport.className = 'map-viewport';
    viewport.tabIndex = 0;

    const canvas = document.createElement('div');
    canvas.className = 'map-canvas';

    const layoutEl = document.createElement('div');
    layoutEl.className = 'graph-layout';

    const bandsEl = document.createElement('div');
    bandsEl.className = 'graph-depth-bands';

    const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.classList.add('graph-edges');

    const nodesEl = document.createElement('div');
    nodesEl.className = 'graph-nodes';

    layoutEl.appendChild(bandsEl);
    layoutEl.appendChild(svgEl);
    layoutEl.appendChild(nodesEl);
    canvas.appendChild(layoutEl);

    const graphView = new GraphView(wf, layoutEl, svgEl, nodesEl, bandsEl);
    graphView.relayout();

    viewport.appendChild(canvas);

    const hint = document.createElement('div');
    hint.className = 'map-hint';
    hint.textContent = 'Drag to pan \u00b7 Scroll to zoom \u00b7 Double-click to fit \u00b7 Arrow keys to move \u00b7 +/- zoom \u00b7 0 fit \u00b7 Click node to pin path';

    const minimap = document.createElement('div');
    minimap.className = 'map-minimap';
    minimap.innerHTML =
      '<span class="map-minimap-label">Overview</span>' +
      '<div class="map-minimap-content"></div>' +
      '<div class="map-minimap-viewport"></div>';

    shell.appendChild(viewport);

    shell._initMap = function () {
      if (shell._panZoom) {
        shell._panZoom.measureCanvas();
        shell._panZoom.syncMinimapRects();
        shell._panZoom.updateMinimap();
        return;
      }

      const panZoom = new PanZoomMap(viewport, canvas, minimap, zoomBadge, graphView);
      shell._panZoom = panZoom;

      graphView.onLayoutChange = function () {
        panZoom.measureCanvas();
        panZoom.syncMinimapRects();
        panZoom.updateMinimap();
      };

      panZoom.syncMinimapRects();

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          panZoom.measureCanvas();
          panZoom.fitToView();
          panZoom.syncMinimapRects();
        });
      });
    };

    const toolbar = createMapToolbar({
      zoomIn: function () {
        const rect = viewport.getBoundingClientRect();
        shell._panZoom.zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, ZOOM_STEP);
      },
      zoomOut: function () {
        const rect = viewport.getBoundingClientRect();
        shell._panZoom.zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 1 / ZOOM_STEP);
      },
      fit: function () { shell._panZoom.fitToView(); },
      reset: function () {
        const rect = viewport.getBoundingClientRect();
        const size = shell._panZoom.getCanvasSize();
        shell._panZoom.scale = 1;
        shell._panZoom.panX = (rect.width - size.width) / 2;
        shell._panZoom.panY = (rect.height - size.height) / 2;
        shell._panZoom.applyTransform();
      },
      expandAll: function () { graphView.expandAll(); },
      collapseAll: function () { graphView.collapseAll(); }
    });

    shell.appendChild(toolbar);
    shell.appendChild(zoomBadge);
    shell.appendChild(hint);
    shell.appendChild(minimap);

    viewport.addEventListener('keydown', function (e) {
      if (activeShell !== shell || !shell._panZoom) return;
      const pz = shell._panZoom;
      const step = e.shiftKey ? 80 : 40;
      if (e.key === 'ArrowLeft') { e.preventDefault(); pz.panBy(step, 0); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); pz.panBy(-step, 0); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); pz.panBy(0, step); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); pz.panBy(0, -step); }
      else if (e.key === '+' || e.key === '=') {
        e.preventDefault();
        const rect = viewport.getBoundingClientRect();
        pz.zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, ZOOM_STEP);
      } else if (e.key === '-') {
        e.preventDefault();
        const rect = viewport.getBoundingClientRect();
        pz.zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 1 / ZOOM_STEP);
      }
      else if (e.key === '0') { e.preventDefault(); pz.fitToView(); }
    });

    shell._graphView = graphView;
    shell._viewport = viewport;
    return shell;
  }

  function activateTab(index) {
    tabsEl.querySelectorAll('.tab-btn').forEach(function (btn, i) {
      btn.setAttribute('aria-selected', i === index ? 'true' : 'false');
    });
    mainEl.querySelectorAll('.tab-panel').forEach(function (panel, i) {
      const active = i === index;
      panel.classList.toggle('active', active);
      panel.hidden = !active;
      if (active) {
        const shell = panel.querySelector('.map-shell');
        activeShell = shell;
        if (shell && shell._initMap) {
          requestAnimationFrame(function () {
            shell._initMap();
            if (shell._viewport) shell._viewport.focus({ preventScroll: true });
          });
        }
      }
    });
  }

  if (workflows.length === 0) {
    mainEl.innerHTML = '<p class="empty">No workflows in this report.</p>';
    return;
  }

  tabsEl.hidden = false;
  idCounter = 0;

  workflows.forEach(function (wf, index) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tab-btn';
    btn.id = 'tab-' + index;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', index === 0 ? 'true' : 'false');
    btn.setAttribute('aria-controls', tabId(index));
    btn.title = wf.path;
    btn.textContent = shortName(wf.path);
    btn.addEventListener('click', function () { activateTab(index); });
    tabsEl.appendChild(btn);

    const panel = document.createElement('section');
    panel.className = 'tab-panel' + (index === 0 ? ' active' : '');
    panel.id = tabId(index);
    panel.setAttribute('role', 'tabpanel');
    panel.hidden = index !== 0;

    const pathHint = document.createElement('p');
    pathHint.className = 'tab-panel-path';
    pathHint.textContent = wf.path;
    panel.appendChild(pathHint);
    panel.appendChild(renderWorkflowGraph(wf));
    mainEl.appendChild(panel);
  });

  requestAnimationFrame(function () {
    activateTab(0);
  });
})();
  </script>
</body>
</html>
